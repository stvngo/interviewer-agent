services:
  backend:
    build: .
    container_name: interview-agent-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

  db:
    image: postgres:16
    container_name: interview-agent-db
    environment:
      POSTGRES_DB: interview_agent
      POSTGRES_USER: interview_agent
      POSTGRES_PASSWORD: interview_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: interview-agent-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:

